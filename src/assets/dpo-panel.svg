<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1000">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="knobGrad">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="70%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="jackGrad">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
  </defs>

  <!-- Panel background -->
  <rect width="840" height="1000" fill="url(#panelBg)" rx="4"/>
  <rect x="2" y="2" width="836" height="996" fill="none" stroke="#333" stroke-width="2" rx="3"/>

  <!-- Mounting holes -->
  <circle cx="20" cy="20" r="6" fill="none" stroke="#444" stroke-width="1.5"/>
  <circle cx="820" cy="20" r="6" fill="none" stroke="#444" stroke-width="1.5"/>
  <circle cx="20" cy="980" r="6" fill="none" stroke="#444" stroke-width="1.5"/>
  <circle cx="820" cy="980" r="6" fill="none" stroke="#444" stroke-width="1.5"/>

  <!-- Title -->
  <text x="420" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#ccc" letter-spacing="8">DPO</text>
  <text x="420" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#666" letter-spacing="3">MAKE NOISE</text>

  <!-- Section dividers -->
  <line x1="280" y1="100" x2="280" y2="900" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="560" y1="100" x2="560" y2="900" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Section labels -->
  <text x="140" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#c32c28" font-weight="600" letter-spacing="2">VCO A</text>
  <text x="420" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#888" font-weight="600" letter-spacing="2">FM BUS</text>
  <text x="700" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#4a8ec3" font-weight="600" letter-spacing="2">VCO B</text>

  <!-- ===== VCO A SECTION ===== -->
  <!-- VCO A knobs row 1: COARSE, FINE, SHAPE -->
  <g transform="translate(70, 170)">
    <circle cx="0" cy="0" r="30" fill="url(#knobGrad)" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="-26" stroke="#c32c28" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">COARSE</text>
  </g>
  <g transform="translate(140, 190)">
    <circle cx="0" cy="0" r="20" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="-17" stroke="#c32c28" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">FINE</text>
  </g>
  <g transform="translate(210, 170)">
    <circle cx="0" cy="0" r="30" fill="url(#knobGrad)" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="-26" stroke="#c32c28" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">SHAPE</text>
  </g>

  <!-- VCO A switches -->
  <g transform="translate(70, 290)">
    <rect x="-12" y="-18" width="24" height="36" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <rect x="-8" y="-14" width="16" height="12" rx="2" fill="#333"/>
    <text x="0" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">SYNC</text>
  </g>
  <g transform="translate(140, 290)">
    <rect x="-12" y="-18" width="24" height="36" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <rect x="-8" y="-14" width="16" height="12" rx="2" fill="#333"/>
    <text x="0" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">RANGE</text>
  </g>

  <!-- VCO A attenuators -->
  <g transform="translate(70, 380)">
    <circle cx="0" cy="0" r="15" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="-12" stroke="#c32c28" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">FM A</text>
  </g>
  <g transform="translate(140, 380)">
    <circle cx="0" cy="0" r="15" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="-12" stroke="#c32c28" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">LIN FM</text>
  </g>
  <g transform="translate(210, 380)">
    <circle cx="0" cy="0" r="15" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="-12" stroke="#c32c28" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">EXP FM</text>
  </g>

  <!-- VCO A CV jacks row -->
  <g transform="translate(70, 470)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">1V/OCT</text>
  </g>
  <g transform="translate(140, 470)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">LIN FM</text>
  </g>
  <g transform="translate(210, 470)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">EXP FM</text>
  </g>

  <!-- VCO A more jacks -->
  <g transform="translate(70, 550)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">SHAPE</text>
  </g>
  <g transform="translate(140, 550)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">SYNC</text>
  </g>

  <!-- VCO A outputs -->
  <text x="140" y="630" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#c32c28" font-weight="600">OUTPUTS</text>
  <g transform="translate(70, 670)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#c32c28" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#c32c28" opacity="0.6"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#999">SINE</text>
  </g>
  <g transform="translate(140, 670)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#c32c28" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#c32c28" opacity="0.6"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#999">SAW</text>
  </g>
  <g transform="translate(210, 670)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#c32c28" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#c32c28" opacity="0.6"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#999">SHAPE</text>
  </g>

  <!-- ===== FM BUS SECTION ===== -->
  <g transform="translate(350, 170)">
    <circle cx="0" cy="0" r="26" fill="url(#knobGrad)" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="-6" x2="0" y2="-22" stroke="#e8a530" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">FM AMT</text>
  </g>
  <g transform="translate(490, 170)">
    <circle cx="0" cy="0" r="26" fill="url(#knobGrad)" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="-6" x2="0" y2="-22" stroke="#e8a530" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">FM DIR</text>
  </g>

  <!-- FM switch -->
  <g transform="translate(420, 280)">
    <rect x="-14" y="-20" width="28" height="40" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <circle cx="0" cy="-6" r="6" fill="#555"/>
    <text x="0" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">LIN/EXP</text>
  </g>

  <!-- FM jacks -->
  <g transform="translate(350, 370)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">FM CV</text>
  </g>
  <g transform="translate(420, 370)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">1V/OCT B</text>
  </g>
  <g transform="translate(490, 370)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">STRIKE</text>
  </g>

  <!-- FM more jacks -->
  <g transform="translate(350, 470)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">FOLLOW</text>
  </g>
  <g transform="translate(490, 470)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">ALL</text>
  </g>

  <!-- ===== VCO B / SHAPE / ANGLE / MOD / FOLD ===== -->
  <!-- VCO B knobs -->
  <g transform="translate(630, 170)">
    <circle cx="0" cy="0" r="30" fill="url(#knobGrad)" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="-26" stroke="#4a8ec3" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">COARSE</text>
  </g>
  <g transform="translate(700, 190)">
    <circle cx="0" cy="0" r="20" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="-17" stroke="#4a8ec3" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">FINE</text>
  </g>
  <g transform="translate(770, 170)">
    <circle cx="0" cy="0" r="30" fill="url(#knobGrad)" stroke="#555" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="-26" stroke="#4a8ec3" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888">SHAPE</text>
  </g>

  <!-- SHAPE knobs -->
  <text x="700" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666" font-weight="600" letter-spacing="1">SHAPE</text>
  <g transform="translate(630, 300)">
    <circle cx="0" cy="0" r="22" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="-18" stroke="#4a8ec3" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(770, 300)">
    <circle cx="0" cy="0" r="22" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="-18" stroke="#4a8ec3" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ANGLE knobs -->
  <text x="700" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666" font-weight="600" letter-spacing="1">ANGLE</text>
  <g transform="translate(630, 410)">
    <circle cx="0" cy="0" r="22" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="-18" stroke="#4a8ec3" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(770, 410)">
    <circle cx="0" cy="0" r="22" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="-18" stroke="#4a8ec3" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- MOD / FOLD labels and jacks -->
  <text x="650" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666" font-weight="600" letter-spacing="1">MOD</text>
  <text x="760" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666" font-weight="600" letter-spacing="1">FOLD</text>

  <g transform="translate(630, 530)">
    <circle cx="0" cy="0" r="15" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="-12" stroke="#4a8ec3" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(700, 530)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">MOD CV</text>
  </g>
  <g transform="translate(770, 530)">
    <circle cx="0" cy="0" r="15" fill="url(#knobGrad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="-12" stroke="#4a8ec3" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(630, 610)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">SHAPE</text>
  </g>
  <g transform="translate(700, 610)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">ANGLE</text>
  </g>
  <g transform="translate(770, 610)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#666" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#222"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#666">FOLD CV</text>
  </g>

  <!-- VCO B outputs -->
  <text x="700" y="700" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#4a8ec3" font-weight="600">OUTPUTS</text>
  <g transform="translate(630, 740)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#4a8ec3" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#4a8ec3" opacity="0.6"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#999">SINE</text>
  </g>
  <g transform="translate(700, 740)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#4a8ec3" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#4a8ec3" opacity="0.6"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#999">SAW</text>
  </g>
  <g transform="translate(770, 740)">
    <circle cx="0" cy="0" r="12" fill="url(#jackGrad)" stroke="#4a8ec3" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#4a8ec3" opacity="0.6"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#999">FINAL</text>
  </g>

  <!-- Bottom shared outputs -->
  <line x1="40" y1="820" x2="800" y2="820" stroke="#2a2a2a" stroke-width="1"/>
  <text x="420" y="850" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#666" font-weight="600" letter-spacing="2">MAIN OUTPUTS</text>

  <g transform="translate(140, 910)">
    <circle cx="0" cy="0" r="14" fill="url(#jackGrad)" stroke="#c32c28" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="#c32c28" opacity="0.5"/>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#c32c28">A OUT</text>
  </g>
  <g transform="translate(340, 910)">
    <circle cx="0" cy="0" r="14" fill="url(#jackGrad)" stroke="#e8a530" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="#e8a530" opacity="0.5"/>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#e8a530">FM BUS</text>
  </g>
  <g transform="translate(500, 910)">
    <circle cx="0" cy="0" r="14" fill="url(#jackGrad)" stroke="#888" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="#888" opacity="0.5"/>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#888">FOLLOW</text>
  </g>
  <g transform="translate(700, 910)">
    <circle cx="0" cy="0" r="14" fill="url(#jackGrad)" stroke="#4a8ec3" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="#4a8ec3" opacity="0.5"/>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#4a8ec3">B OUT</text>
  </g>
</svg>
